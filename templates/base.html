<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="/favicon.png">
  <meta name="description" content="Articles about literature, science fiction, and philosophy">
  <meta name="og:title" content="{{ site_title }}">
  <meta name="twitter:card" content="summary_large_image">
  <link rel="stylesheet" href="/static/style.css?v=2">
  {% block head %}{% endblock %}
  <script>
    (function() {
      var saved = localStorage.getItem('theme');
      if (saved) document.documentElement.setAttribute('data-theme', saved);
    })();
  </script>
</head>
<body>
  <div class="container">
    <header class="header">
      <button class="toggle" id="theme-toggle" title="Toggle dark mode" aria-label="Toggle dark mode">
        <!-- shown in light mode (click to go dark) -->
        <svg class="icon-dark" width="21" height="21" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" fill="none" aria-hidden="true">
          <circle cx="12" cy="12" r="9"/>
          <path d="M12 3 A9 9 0 0 1 12 21 Z" fill="currentColor" stroke="none"/>
        </svg>
        <!-- shown in dark mode (click to go light) -->
        <svg class="icon-light" width="21" height="21" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" fill="none" aria-hidden="true">
          <circle cx="12" cy="12" r="9"/>
          <path d="M12 3 A9 9 0 0 0 12 21 Z" fill="currentColor" stroke="none"/>
        </svg>
      </button>
      <a href="/" class="namelink">Home</a>
      <a href="/philosophy-archive">Philosophy archive</a>
      <a href="/about">About</a>
      <a href="/tags">Tags</a>
    </header>
    <main class="main">
      {% block content %}{% endblock %}
    </main>
  </div>
  <script src="/static/theme.js"></script>
</body>
</html>
